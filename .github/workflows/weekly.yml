name: threads-weekly-report

on:
  schedule:
    # 毎週月曜 06:00 JST（= 日曜 21:00 UTC）。分析→週次レポート→（任意で）翌週コンテンツ生成。
    - cron: "0 21 * * 0"
  workflow_dispatch: {}

concurrency:
  group: threads-weekly   # 投稿/収集とは別系統
  cancel-in-progress: false

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt anthropic

      - name: Run weekly (分析→レポート→任意で生成)
        env:
          BUSINESSES: ${{ secrets.BUSINESSES }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          TZ_NAME: Asia/Tokyo
          # 生成は既定オフ。ANTHROPIC_API_KEY を Secret 登録し、Variable GENERATE_POSTS=1 で有効化。
          GENERATE_POSTS: ${{ vars.GENERATE_POSTS || '0' }}
          # GEN_STATUS=draft(人が確認) / queued(完全全自動で公開)。安全のため既定 draft。
          GEN_STATUS: ${{ vars.GEN_STATUS || 'draft' }}
          GEN_POSTS_PER_ACCOUNT: ${{ vars.GEN_POSTS_PER_ACCOUNT || '5' }}
          GEN_MODEL: ${{ vars.GEN_MODEL || 'claude-opus-4-8' }}
          # キルスイッチ: Variable PAUSED=1 で生成・投稿を即停止。
          PAUSED: ${{ vars.PAUSED || '0' }}
          REPORTS_DIR: reports
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main_weekly.py

      - name: 公開前通知メール（HTMLレポート＋今週の投稿）
        # メールを使うときだけ Variable ENABLE_EMAIL=1 を設定（secrets は if: で使えないため vars で制御）
        if: ${{ vars.ENABLE_EMAIL == '1' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: Threads週次レポート <${{ secrets.MAIL_USERNAME }}>
          to: morll.0802@gmail.com
          subject: "【Threads週次】分析レポート＋今週の自動投稿"
          html_body: file://reports/メール本文.html
          attachments: reports/*.html
