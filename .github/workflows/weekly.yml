name: threads-weekly-report

on:
  schedule:
    # 毎日 06:00 JST（= 21:00 UTC）に起動するが、main_weekly.py 内の3日サイクルゲートが
    # 起点日(2026-06-28)から3日ごとの日だけ本処理を実行する（それ以外の日は即終了）。
    # ＝「3日分の投稿生成→3日分を分析してレポート」を3日に1回のPDCAで回す。
    - cron: "0 21 * * *"
  workflow_dispatch: {}   # 手動実行。FORCE_CYCLE=1 を Variable に入れるとサイクル日以外でも実行可。

concurrency:
  group: threads-weekly   # 投稿/収集とは別系統
  cancel-in-progress: false

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt anthropic

      - name: Run weekly (分析→レポート→任意で生成)
        env:
          BUSINESSES: ${{ secrets.BUSINESSES }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          TZ_NAME: Asia/Tokyo
          # 生成は既定オフ。ANTHROPIC_API_KEY を Secret 登録し、Variable GENERATE_POSTS=1 で有効化。
          GENERATE_POSTS: ${{ vars.GENERATE_POSTS || '0' }}
          # GEN_STATUS=draft(人が確認) / queued(完全全自動で公開)。安全のため既定 draft。
          GEN_STATUS: ${{ vars.GEN_STATUS || 'draft' }}
          GEN_POSTS_PER_ACCOUNT: ${{ vars.GEN_POSTS_PER_ACCOUNT || '5' }}
          # 1日4本スケジュール対象（製造業/占い）は1サイクル分＝3日×4本＝12本（既定）。
          # 個別に上書きしたいときだけ Variable で設定。
          GEN_POSTS_SEIZOGYO: ${{ vars.GEN_POSTS_SEIZOGYO || '12' }}
          GEN_POSTS_URANAI: ${{ vars.GEN_POSTS_URANAI || '12' }}
          GEN_MODEL: ${{ vars.GEN_MODEL || 'claude-opus-4-8' }}
          # キルスイッチ: Variable PAUSED=1 で生成・投稿を即停止。
          PAUSED: ${{ vars.PAUSED || '0' }}
          # 手動実行(workflow_dispatch)でサイクル日以外でも回したいとき Variable FORCE_CYCLE=1。
          FORCE_CYCLE: ${{ vars.FORCE_CYCLE || '0' }}
          REPORTS_DIR: reports
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # メール送信は main_weekly.py がアカウントごとに1通ずつ行う（ENABLE_EMAIL=1＋下記secret必須）。
          # EMAIL_BUSINESSES を空にすると運用中の全アカウントに個別送信（既定）。
          ENABLE_EMAIL: ${{ vars.ENABLE_EMAIL || '0' }}
          EMAIL_BUSINESSES: ${{ vars.EMAIL_BUSINESSES || '' }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO: ${{ vars.MAIL_TO || secrets.MAIL_USERNAME }}
        run: python main_weekly.py
